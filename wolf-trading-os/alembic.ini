[alembic]
script_location = migrations
prepend_sys_path = src
path_separator = os
file_template = %%(rev)s_%%(slug)s
timezone = UTC
# sqlalchemy.url is intentionally NOT set here — it is resolved at runtime
# from WTOS_DATABASE_URL via migrations/env.py. Never hardcode credentials.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
