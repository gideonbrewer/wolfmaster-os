name: CI

on:
  push:
    branches: [main]
    paths: ["wolf-trading-os/**", ".github/workflows/ci.yml"]
  pull_request:
    paths: ["wolf-trading-os/**", ".github/workflows/ci.yml"]

defaults:
  run:
    working-directory: wolf-trading-os

jobs:
  lint:
    name: Ruff lint + format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .

  typecheck:
    name: MyPy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: MyPy
        run: mypy

  test:
    name: Pytest (unit + PostgreSQL integration)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: wolf
          POSTGRES_PASSWORD: wolf
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wolf"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      WTOS_ENVIRONMENT: test
      WTOS_TEST_DATABASE_URL: postgresql+psycopg://wolf:wolf@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Unit tests
        run: pytest tests/unit
      - name: Integration tests (PostgreSQL-backed)
        run: pytest tests/integration -m integration
