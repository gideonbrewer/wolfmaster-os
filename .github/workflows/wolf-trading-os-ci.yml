name: CI

on:
  push:
    # Feature branches are tested on push, not only via pull requests.
    branches: [main, "claude/**", "feature/**", "fix/**"]
    paths: ["wolf-trading-os/**", ".github/workflows/wolf-trading-os-ci.yml"]
  pull_request:
    paths: ["wolf-trading-os/**", ".github/workflows/wolf-trading-os-ci.yml"]

defaults:
  run:
    working-directory: wolf-trading-os

jobs:
  lint:
    name: Ruff lint + format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .

  typecheck:
    name: MyPy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: MyPy
        run: mypy

  test:
    name: Pytest (unit + PostgreSQL integration)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: wolf
          POSTGRES_PASSWORD: wolf
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wolf"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      WTOS_ENVIRONMENT: test
      WTOS_TEST_DATABASE_URL: postgresql+psycopg://wolf:wolf@localhost:5432/postgres
      # An unreachable database FAILS the session — integration tests can
      # never be silently skipped in CI (audit finding H5).
      WTOS_REQUIRE_DB: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Unit tests
        run: pytest tests/unit
      - name: Integration tests (PostgreSQL-backed)
        run: |
          set -o pipefail
          pytest tests/integration -m integration -v 2>&1 | tee integration.log
      - name: Verify integration tests actually ran
        run: |
          python - <<'EOF'
          import re, sys

          log = open("integration.log", encoding="utf-8").read()
          passed = re.search(r"(\d+) passed", log)
          skipped = re.search(r"(\d+) skipped", log)
          count = int(passed.group(1)) if passed else 0
          print(f"integration tests executed: {count}")
          if skipped:
              sys.exit(f"{skipped.group(1)} integration test(s) were skipped in CI")
          if count == 0:
              sys.exit("zero integration tests ran - treating as failure")
          EOF
